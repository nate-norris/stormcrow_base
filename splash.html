<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      video {
        width: 300px;
        height: auto;
      }
    </style>
  </head>

  <body>
    <img id="splash" src="splash_frames/frame_001.png" style="width:300px;height:300px;">
      <script>
        const totalFrames = 60; // number of frames in sequence
        const fps = 30;
        let current = 1;
        const img = document.getElementById("splash");

        setInterval(() => {
          current++;
          if (current > totalFrames) current = 1;
          img.src = `splash_frames/frame_${String(current).padStart(3,'0')}.png`;
        }, 1000/fps);
      </script>
  </body>
</html>
